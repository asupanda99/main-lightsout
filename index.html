<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lights Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Lights Out VS</h1>
            <div class="controls-top">
                <div class="difficulty-selector">
                    <label for="difficulty">Size: </label>
                    <select id="difficulty">
                        <option value="3">3x3</option>
                        <option value="5" selected>5x5</option>
                        <option value="7">7x7</option>
                    </select>
                </div>
                <div class="theme-toggle">
                    <button id="dark-mode-toggle" class="btn" aria-label="Toggle Dark Mode">🌙</button>
                </div>
            </div>
            
            <div class="match-info">
                <div class="timer">Time: <span id="time-left" class="time-display">03:00</span></div>
                <div class="scores" id="scores-display">
                    <span id="p1-box" class="player-box active-player">P1: <span id="p1-score">0</span></span>
                    <span id="p2-box" class="player-box">P2: <span id="p2-score">0</span></span>
                </div>
            </div>
            
            <div class="stats">
                <span class="moves">Moves this board: <span id="move-counter">0</span></span>
            </div>
        </header>

        <main>
            <div id="game-board" class="board hidden"></div>
            
            <div id="win-message" class="hidden">
                <h2 id="winner-text">Match Over!</h2>
                <p id="winner-subtext">Player 1 wins!</p>
            </div>
            
            <div id="turn-overlay" class="">
                <h2 id="turn-text">Player 1 Ready</h2>
                <p>You have 3 minutes to solve as many boards as possible!</p>
                <button id="start-turn-btn" class="btn primary-btn mt-main">Start Turn</button>
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="btn primary-btn hidden">Abort Match</button>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
