<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lights Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Lights Out</h1>
            <div class="controls-top">
                <div class="difficulty-selector">
                    <label for="difficulty">Grid Size: </label>
                    <select id="difficulty">
                        <option value="3">3x3</option>
                        <option value="5" selected>5x5</option>
                        <option value="7">7x7</option>
                    </select>
                </div>
                <div class="theme-toggle">
                    <button id="dark-mode-toggle" class="btn" aria-label="Toggle Dark Mode">🌙</button>
                </div>
            </div>
            <div class="stats">
                <span class="moves">Moves: <span id="move-counter">0</span></span>
            </div>
        </header>

        <main>
            <div id="game-board" class="board"></div>
            <div id="win-message" class="hidden">
                <h2>You Win!</h2>
                <p>All lights are off.</p>
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="btn primary-btn">Restart Game</button>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
